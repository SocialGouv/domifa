<div *ngIf="usagerProfile" class="w-100 fr-background-contrast--blue-ecume">
  <div
    class="fr-container fr-grid-row fr-display-flex fr-flex-row fr-justify-content-between"
  >
    <div
      class="fr-col-12 fr-col-md-8 fr-col-sm-8 fr-py-2w fr-py-md-6w fr-display-flex fr-flex-column fr-gap-1"
    >
      <h1 class="fr-text-title--blue-france fr-mb-1v">
        Bonjour {{ usagerProfile.usager.prenom }}
        {{ usagerProfile.usager.nom | uppercase }}
      </h1>
      <p class="fr-text--lead fr-text-title--blue-france">
        Bienvenue dans votre espace de suivi de courrier
      </p>
    </div>
    <div class="fr-col-2 fr-py-1w d-sm-block">
      <img class="fr-responsive-img" src="/assets/images/home.svg" alt="" />
    </div>
  </div>
</div>

<ng-container *ngIf="usagerProfile">
  <div class="fr-container fr-mt-3w">
    <div class="fr-grid-row fr-grid-row--gutters">
      <div class="fr-col-12 fr-col-md-6 fr-mb-3w">
        <app-section-courriers
          [usager]="usagerProfile.usager"
        ></app-section-courriers>
      </div>
      <div class="fr-col-12 fr-col-md-6 fr-mb-3w">
        <app-structure-information
          [structureInformation]="structureInformation"
        ></app-structure-information>
      </div>
      <div class="fr-col-12 fr-col-md-6 fr-mb-0">
        <app-section-infos [usager]="usagerProfile.usager"></app-section-infos>
      </div>

      <div class="fr-col-12 fr-col-md-6 fr-mb-3w">
        <app-section-docs [usager]="usagerProfile.usager"></app-section-docs>
      </div>
      <div class="fr-col-12 fr-mt-1w">
        <app-section-options
          [usager]="usagerProfile.usager"
        ></app-section-options>
      </div>
    </div>
  </div>
  <div class="fr-grid-row">
    <div class="fr-col-12 fr-py-3w fr-border-default--blue-france">
      <div class="fr-container">
        <app-section-links [usager]="usagerProfile.usager"></app-section-links>
      </div>
    </div>
  </div>
</ng-container>
