<div class="fr-py-2w">
  <div class="fr-container">
    <div class="fr-p-2w">
      <h1>Plan du site de Mon DomiFa</h1>
      <div class="fr-grid-row fr-grid-row--gutters">
        <ng-container *ngFor="let linkSection of sitemapLinks">
          <div class="fr-col-12 fr-col-md-4 fr-my-2w">
            <h2 class="fr-my-2w">
              {{ linkSection.section }}
            </h2>
            <ul>
              <li *ngFor="let link of linkSection.links">
                <a class="fr-link" [routerLink]="link.path">{{ link.label }}</a>
              </li>
            </ul>
          </div>
        </ng-container>
        <div class="fr-col-12 fr-col-md-4 fr-my-2w">
          <h2 class="fr-my-2w">Nos partenaires</h2>
          <ul>
            <li *ngFor="let link of partnerLinks">
              <a
                rel="noopener noreferrer"
                class="fr-link"
                [href]="link.path"
                target="_blank"
                [title]="link.label + ' - Nouvelle fenêtre'"
                >{{ link.label }}
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
