<dsfr-modal
  #idleModal
  [titleModal]="'Souhaitez-vous poursuivre votre navigation sur DomiFa ?'"
  [size]="'MD'"
  dialogId="idleModal"
>
  <p>
    Aucune activité n'a été enregistrée depuis une heure, vous allez être
    automatiquement déconnecté dans 1 minute.
  </p>

  <ng-template #modalFooterTemplate>
    <div
      class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg"
    >
      <button class="fr-btn" type="button" (click)="resetTimer()">
        Oui, je reste connecté
      </button>
      <button class="fr-btn fr-btn--secondary" type="button" (click)="logout()">
        Non, je me déconnecte
      </button>
    </div>
  </ng-template>
</dsfr-modal>
