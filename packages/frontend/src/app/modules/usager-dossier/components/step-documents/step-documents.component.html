<app-step-header
  *ngIf="usager"
  [usager]="usager"
  [currentStep]="3"
></app-step-header>

<div class="fr-content-container">
  @let me = (currentUserSubject$ | async); @if (me) {
  <div class="fr-container">
    <div class="fr-content">
      @if (usager) {
      <app-form-stepper [usager]="usager" [currentStep]="3"></app-form-stepper>
      }

      <p>
        Cette étape est optionnelle, rien ne vous oblige à enregistrer des
        pièces justificatives.
      </p>

      <div class="fr-my-3w">
        <app-display-usager-docs
          [me]="me"
          [editPJ]="true"
          [usager]="usager"
        ></app-display-usager-docs>
      </div>

      <div
        class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg"
      >
        <button
          [disabled]="loading"
          [attr.aria-busy]="loading"
          type="submit"
          class="fr-btn"
          (click)="nextStep(4)"
        >
          @if (!loading) {
          <span>Suivant</span>
          } @else {
          <span>Veuillez patienter...</span>
          }
        </button>
        <a routerLink="/manage" class="fr-btn fr-btn--secondary">
          Continuer plus tard
        </a>
      </div>
    </div>
  </div>
  }

  <app-step-footer [usager]="usager"></app-step-footer>
</div>
