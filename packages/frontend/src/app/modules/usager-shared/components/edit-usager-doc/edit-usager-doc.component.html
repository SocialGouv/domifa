<app-button
  (action)="openModal()"
  [ariaLabel]="'Modifier le document ' + doc.label"
  content="Modifier"
  icon="edit"
  color="primary"
  [loading]="loading"
>
</app-button>

<dsfr-modal
  #editDocumentModal
  [titleModal]="'Modifier le document: ' + doc.label"
  [isScrollable]="true"
  [size]="'LG'"
>
  <form [formGroup]="documentForm" (ngSubmit)="patchDocument()">
    <p>
      Les champs suivis d'un
      <span class="fr-text--bold fr-text-default--error">*</span> sont
      obligatoires
    </p>

    <div
      class="fr-input-group"
      [class.fr-input-group--error]="submitted && u.label.errors"
    >
      <label class="fr-label" for="label">
        Nom du document
        <span class="fr-hint-text" id="label-description"
          >Exemple : Cerfa signé, impots, carte identité, etc..</span
        >
      </label>
      <input
        type="text"
        class="fr-input"
        formControlName="label"
        name="label"
        appCleanStr
        id="label"
        [class.fr-input--error]="submitted && u.label.errors"
        [attr.aria-describedby]="
          submitted && u.label.errors ? 'label-errors' : 'label-description'
        "
        required
      />
      @if (submitted && u.label.errors) {
      <p id="label-errors" class="fr-error-text">
        Le nom du document est obligatoire
      </p>
      }
    </div>

    <div class="fr-toggle" *ngIf="usager.options.portailUsagerEnabled">
      <input
        type="checkbox"
        formControlName="shared"
        class="fr-toggle__input"
        id="toggle-2"
        aria-describedby="toggle-2-messages"
      />
      <label class="fr-toggle__label" for="toggle-2">
        Partager le document avec le domicilié sur "Mon DomiFa"</label
      >
      <div
        class="fr-messages-group"
        id="toggle-2-messages"
        aria-live="polite"
      ></div>
    </div>

    @if (usager.options.portailUsagerEnabled) {
    <div class="fr-alert fr-alert--info">
      <p>
        Attention: le domicilié pourra télécharger le document depuis un
        ordinateur ou un téléphone
      </p>
    </div>
    }
  </form>

  <ng-template #modalFooterTemplate>
    <div
      class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg"
    >
      <button
        type="button"
        class="fr-btn"
        (click)="patchDocument()"
        [disabled]="loading"
        [attr.aria-busy]="loading"
        [attr.aria-label]="'Valider la modification du document: ' + doc.label"
      >
        Valider
      </button>
      <button
        type="button"
        class="fr-btn fr-btn--secondary"
        (click)="closeModals()"
      >
        Annuler
      </button>
    </div>
  </ng-template>
</dsfr-modal>
