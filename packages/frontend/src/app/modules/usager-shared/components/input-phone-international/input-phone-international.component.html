<div
  class="fr-input-group"
  [class.fr-input-group--error]="
    (isTouched || submitted) &&
    ((isRequired && !phoneNumber) || (!isValid && phoneNumber))
  "
>
  <label class="fr-label" [class.required]="isRequired" [for]="inputId">
    Numéro de téléphone
  </label>
  <p class="fr-hint-text" [id]="inputId + '-desc'">
    Format attendu : sans l'indicatif (ex: 612345678)
  </p>
  <div class="fr-phone-input-group">
    <span class="phone-flag-indicator" aria-hidden="true">
      <span class="iti__flag" [ngClass]="'iti__' + selectedCountry.iso2"></span>
    </span>
    <dsfrx-dropdownmenu
      size="SM"
      [labelMenu]="'+' + selectedCountry.dialCode"
      [ariaLabelMenu]="
        'Sélectionner l\'indicatif pays. Actuellement : ' +
        selectedCountry.name +
        ' (+' +
        selectedCountry.dialCode +
        ')'
      "
      [closeOnAction]="true"
      menuId="countryDropdown"
      (click)="focusSearchInput()"
    >
      <ng-template #contentTemplate>
        <div class="fr-input-group fr-mb-1v fr-px-1v">
          <label class="fr-label" for="country-search-box"
            >Rechercher un pays</label
          >
          <input
            type="text"
            class="fr-input fr-input--sm"
            id="country-search-box"
            [(ngModel)]="countrySearchText"
            (keyup)="searchCountry()"
            (click)="$event.stopPropagation()"
            autocomplete="off"
          />
        </div>

        <ng-container
          *ngFor="let country of allCountries; trackBy: trackByCountryIso"
        >
          <dsfrx-dropdownmenu-item
            (selectItem)="onCountrySelect(country, focusable)"
          >
            <div
              class="country-option"
              [attr.aria-selected]="country.iso2 === selectedCountry.iso2"
            >
              <span>
                <span class="iti__flag-box fr-mr-1v">
                  <span
                    aria-hidden="true"
                    class="iti__flag"
                    [ngClass]="'iti__' + country.iso2"
                  ></span>
                </span>
                <span class="fr-text--sm">{{ country.name }}</span>
              </span>
              <span class="fr-text--sm fr-text--bold fr-ml-2v">
                +{{ country.dialCode }}
              </span>
            </div>
          </dsfrx-dropdownmenu-item>
        </ng-container>
      </ng-template>
    </dsfrx-dropdownmenu>
    <input
      type="tel"
      class="fr-input"
      [id]="inputId"
      autocomplete="tel"
      [attr.required]="isRequired ? 'true' : null"
      [attr.aria-required]="isRequired"
      (keypress)="onInputKeyPress($event)"
      [value]="phoneNumber"
      (input)="onPhoneNumberChange($event)"
      (blur)="onBlur()"
      [placeholder]="currentPlaceholder"
      [class.fr-input--error]="
        (isTouched || submitted) &&
        ((isRequired && !phoneNumber) || (!isValid && phoneNumber))
      "
      [attr.aria-invalid]="
        (isTouched || submitted) &&
        ((isRequired && !phoneNumber) || (!isValid && phoneNumber))
          ? 'true'
          : 'false'
      "
      [attr.aria-describedby]="inputId + '-desc ' + inputId + '-messages'"
      #focusable
    />
  </div>

  <div
    class="fr-messages-group"
    [id]="inputId + '-messages'"
    aria-live="polite"
  >
    <p
      class="fr-message fr-message--error"
      *ngIf="(isTouched || submitted) && isRequired && !phoneNumber"
    >
      Le numéro de téléphone est obligatoire.
    </p>

    <p
      class="fr-message fr-message--error"
      *ngIf="(isTouched || submitted) && phoneNumber && !isValid"
    >
      Le format du numéro de téléphone est incorrect.
    </p>
  </div>
</div>
