@if (nbReferrers > 0) {
<app-input-referrer
  [submitted]="submitted"
  [displayLabel]="true"
  [displayHint]="false"
  label="À qui assigner les référents ?"
  [required]="true"
  (outputFunction)="updateReferrers($event)"
></app-input-referrer>

<div class="fr-alert fr-alert--warning fr-mt-3w">
  <b>
    {{ currentUser | fullName }} est référent de
    {{ nbReferrers }} domiciliés.</b
  >
  <br />Les dossiers seront réassignés au référent sélectionné.
</div>
}
