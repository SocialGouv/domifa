<div class="fr-content-container-light">
  <app-profil-head
    [usager]="usager"
    [section]="section"
    *ngIf="me"
    [me]="me"
  ></app-profil-head>
  <div class="fr-container" *ngIf="usager">
    <div class="fr-content">
      <div
        class="fr-col-md-12 fr-my-4w"
        *ngIf="me.structure.portailUsager.enabledByStructure"
      >
        <app-profil-edit-portail-usager-preference
          [usager]="usager"
          [me]="me"
        ></app-profil-edit-portail-usager-preference>
      </div>

      <div class="fr-grid-row fr-my-3w">
        <div class="fr-col-md-12">
          <div
            class="fr-my-2w fr-display-flex fr-flex-wrap fr-justify-content-between fr-align-items-center"
          >
            <h2 class="fr-h3">
              <i class="fr-icon-at-line" aria-hidden="true"></i>
              Informations de contact
            </h2>
            <ng-container *ngIf="usager?.echeanceInfos?.isActif">
              <button
                type="submit"
                class="fr-btn fr-btn--secondary"
                *ngIf="!editContactDetails"
                (click)="openContactForm()"
              >
                <i class="fr-icon-edit-line" aria-hidden="true"></i>
                Modifier les informations
              </button>
              <button
                type="button"
                class="fr-btn fr-btn--secondary"
                *ngIf="editContactDetails"
                (click)="editContactDetails = false"
              >
                <span
                  class="fr-icon-close-line fr-mr-2w"
                  aria-hidden="true"
                ></span>
                Annuler les modifications
              </button>
            </ng-container>
          </div>
          <app-form-contact-details
            *ngIf="editContactDetails"
            [(editContactDetails)]="editContactDetails"
            [usager]="usager"
          ></app-form-contact-details>
          <app-display-contact-details
            *ngIf="!editContactDetails"
            [usager]="usager"
            [me]="me"
          ></app-display-contact-details>
        </div>
      </div>
    </div>
  </div>
</div>
