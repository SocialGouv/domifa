<div class="fr-content-container-light">
  @if (me) {
  <app-profil-head
    [usager]="usager"
    [section]="section"
    [me]="me"
  ></app-profil-head>
  } @if (usager) {
  <div class="fr-container">
    <div class="fr-content">
      <div class="fr-grid-row">
        <div class="fr-col-md-12 fr-my-4w">
          <app-profil-procuration-courrier
            [usager]="usager"
            [me]="me"
          ></app-profil-procuration-courrier>
        </div>

        <div class="fr-col-md-12 fr-my-4w">
          <app-profil-transfert-courrier
            [usager]="usager"
            [me]="me"
          ></app-profil-transfert-courrier>
        </div>
      </div>
    </div>

    @if (displayDeleteButton) {
    <app-delete-usager-menu
      [usager]="usager"
      context="PROFIL"
    ></app-delete-usager-menu>
    }
  </div>
  }
</div>
