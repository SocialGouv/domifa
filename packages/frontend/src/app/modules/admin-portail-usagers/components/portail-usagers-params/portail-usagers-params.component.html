<div class="fr-content-container-light fr-pb-3w">
  <app-admin-portail-usagers-menu
    [section]="section"
    [title]="
      section === ''
        ? 'Présentation du portail Mon DomiFa'
        : 'Paramètres du portail Mon DomiFa'
    "
  ></app-admin-portail-usagers-menu>

  @if (section === '') {
  <app-landing-page-portail
    (activatePortail)="activatePortail()"
    [isLandingPage]="structure.portailUsager.enabledByStructure"
    [displayMenu]="false"
  ></app-landing-page-portail>
  } @if (section === 'parametres') {
  <div class="fr-container">
    <div class="fr-content">
      <p class="fr-py-2w">
        Après l’activation de la fonctionnalité d’accès au portail dans votre
        structure, il conviendra de la valider pour chaque fiche domiciliés dès
        qu’une demande vous sera adressée.
      </p>

      <form>
        <div class="fr-my-2w fr-toggle">
          <input
            type="checkbox"
            class="fr-toggle__input"
            id="enabledByStructure"
            [(ngModel)]="structure.portailUsager.enabledByStructure"
            name="enabledByStructure"
            aria-describedby="enabledByStructure-messages"
          />
          <label class="fr-toggle__label" for="enabledByStructure">
            Activer l'accès au portail usager
          </label>
          <div
            class="fr-messages-group"
            id="enabledByStructure-messages"
            aria-live="polite"
          ></div>
        </div>

        <div class="fr-my-2w fr-toggle">
          <input
            type="checkbox"
            class="fr-toggle__input"
            id="usagerLoginUpdateLastInteraction"
            [(ngModel)]="
              structure.portailUsager.usagerLoginUpdateLastInteraction
            "
            name="usagerLoginUpdateLastInteraction"
            aria-describedby="usagerLoginUpdateLastInteraction-messages"
          />
          <label
            class="fr-toggle__label"
            for="usagerLoginUpdateLastInteraction"
          >
            Mettre à jour la date de dernier passage
          </label>
          <div
            class="fr-messages-group"
            id="usagerLoginUpdateLastInteraction-messages"
            aria-live="polite"
          ></div>
        </div>

        <div
          *ngIf="successMessage"
          class="fr-alert fr-alert--success fr-my-2w"
          role="alert"
        >
          <p>{{ successMessage }}</p>
        </div>

        <div class="fr-mt-3w" style="text-align: center">
          <button
            class="fr-btn"
            type="submit"
            (click)="submitStructurePortailForm()"
            [disabled]="loading"
            [attr.aria-busy]="loading"
          >
            @if (!loading) { Enregistrer les modifications } @else { Veuillez
            patienter... }
          </button>
        </div>
      </form>
    </div>
  </div>
  }
</div>
