<dsfr-modal
  class="fr-text--left"
  #editorModal
  [modalSize]="'LG'"
  dialogId="structureInformationEditorModal"
  [titleModal]="
    structureInformation ? 'Modifier l\'information' : 'Ajouter une information'
  "
  (closeEvent)="closeModal()"
>
  <ng-container>
    <form [formGroup]="tempMessageForm" *ngIf="tempMessageForm">
      <div
        class="fr-input-group"
        [class.fr-input-group--error]="submitted && f.title.errors"
      >
        <label for="title" class="fr-label">Titre * </label>
        <input
          id="title"
          type="text"
          formControlName="title"
          [class.fr-input--error]="submitted && f.title.errors"
          [attr.aria-invalid]="submitted && f.title.errors ? true : false"
          [attr.aria-describedby]="
            submitted && f.title.errors ? 'invalid-title' : null
          "
          class="fr-input"
          required
        />
        <p
          *ngIf="submitted && f.title.errors"
          class="fr-error-text"
          id="invalid-title"
        >
          Le titre est obligatoire
        </p>
      </div>

      <div
        class="fr-select-group"
        [class.fr-select-group--error]="submitted && f.type.errors"
      >
        <label for="type" class="fr-label">Type d'information * </label>
        <select
          id="type"
          formControlName="type"
          name="type"
          [class.fr-select--error]="submitted && f.type.errors"
          [attr.aria-invalid]="submitted && f.type.errors ? true : false"
          [attr.aria-describedby]="
            submitted && f.type.errors ? 'invalid-type' : null
          "
          class="fr-select"
          required
        >
          <option [ngValue]="null"></option>
          <option value="closing">Fermeture</option>
          <option value="opening-hours">Horaires d'ouverture</option>
          <option value="general">Information générale</option>
          <option value="other">Autre</option>
        </select>
        <p
          *ngIf="submitted && f.type.errors"
          class="fr-error-text"
          id="invalid-type"
        >
          Le type d'information est obligatoire
        </p>
      </div>

      <div
        class="fr-input-group"
        [class.fr-input-group--error]="
          (f.description.dirty || submitted) && f.description.errors
        "
      >
        <label for="description" class="fr-label"
          >Contenu de l'information
        </label>

        <dsfrx-editor
          id="description"
          formControlName="description"
          [value]="f.description.value"
          (onChange)="onEditorChange()"
          [required]="true"
          [hint]="null"
          editorId="editor-description"
          [toolbarOptions]="toolbarOptions"
        ></dsfrx-editor>

        <div
          *ngIf="
            tempMessageForm.get('description')?.invalid &&
            (tempMessageForm.get('description')?.dirty ||
              tempMessageForm.get('description')?.touched)
          "
        >
          <p
            class="fr-error-text"
            *ngIf="tempMessageForm.get('description')?.errors?.['required']"
          >
            La description est requise.
          </p>
          <p
            class="fr-error-text"
            *ngIf="tempMessageForm.get('description')?.errors?.['minlength']"
          >
            La description doit contenir au moins 10 caractères.
          </p>
          <p
            class="fr-error-text"
            *ngIf="tempMessageForm.get('description')?.errors?.['invalidContent']"
          >
            Le contenu de la description n'est pas valide.
          </p>
        </div>
      </div>

      <div class="fr-toggle">
        <input
          type="checkbox"
          class="fr-toggle__input"
          id="isTemporary"
          formControlName="isTemporary"
        />
        <label class="fr-toggle__label" for="isTemporary">
          Information temporaire (affichage à partir d'une date donnée)
        </label>
      </div>

      <div
        class="fr-grid-row fr-grid-row--gutters fr-grid-row--middle fr-my-4w"
        *ngIf="f.isTemporary.value === true"
      >
        <div class="fr-col-12 fr-col-md-6">
          <dsfr-ext-datepicker
            formControlName="startDate"
            label="Date de début de diffusion"
            [required]="true"
            [showMask]="true"
            [message]="
              submitted && f.startDate.errors
                ? 'La date de début est incorrecte. Exemple : 20/12/1996'
                : ''
            "
            [messageSeverity]="'error'"
          ></dsfr-ext-datepicker>
        </div>
        <div class="fr-col-12 fr-col-md-6">
          <dsfr-ext-datepicker
            formControlName="endDate"
            label="Date de fin"
            [required]="true"
            [showMask]="true"
            [message]="
              submitted && f.endDate.errors
                ? f.endDate.errors.required
                  ? 'La date de fin est obligatoire'
                  : 'La date de fin est incorrecte. Exemple : 20/12/1996'
                : ''
            "
            [messageSeverity]="'error'"
          ></dsfr-ext-datepicker>
        </div>
      </div>
    </form>
  </ng-container>

  <ng-template #modalFooterTemplate>
    <div
      class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg"
    >
      <button
        type="button"
        class="fr-btn"
        (click)="onSubmit()"
        [disabled]="loading"
        [attr.aria-busy]="loading"
      >
        <span
          class="fr-icon-refresh-line fr-icon--spin fr-mr-1w"
          aria-hidden="true"
        ></span>
        <span *ngIf="loading">Veuillez patienter...</span>
        <span *ngIf="!loading">
          {{ structureInformation?.uuid ? "Modifier" : "Ajouter" }}
          l'information
        </span>
      </button>
      <button
        type="button"
        [disabled]="loading"
        class="fr-btn fr-btn--secondary"
        (click)="closeModal()"
      >
        Annuler
      </button>
    </div>
  </ng-template>
</dsfr-modal>
