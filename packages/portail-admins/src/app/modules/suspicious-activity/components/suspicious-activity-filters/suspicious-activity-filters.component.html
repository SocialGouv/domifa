<form [formGroup]="form" class="fr-mb-3w">
  <div
    class="fr-grid-row fr-grid-row--gutters fr-grid-row--bottom text-md-start text-center"
  >
    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="sa-action">Type d'événement</label>
        <select class="fr-select" id="sa-action" formControlName="action">
          <option [ngValue]="null">Tous</option>
          <option *ngFor="let action of actions" [ngValue]="action">
            {{ actionLabel(action) }}
          </option>
        </select>
      </div>
    </div>
    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="sa-user-type">Type d'utilisateur</label>
        <select class="fr-select" id="sa-user-type" formControlName="userType">
          <option [ngValue]="null">Tous</option>
          <option *ngFor="let ut of userTypes" [ngValue]="ut">
            {{ userTypeLabel(ut) }}
          </option>
        </select>
      </div>
    </div>
    <div class="fr-col-12 fr-col-md">
      <div class="fr-input-group">
        <label class="fr-label" for="sa-date-from">Date de début</label>
        <input
          class="fr-input"
          type="date"
          id="sa-date-from"
          formControlName="dateFrom"
        />
      </div>
    </div>
    <div class="fr-col-12 fr-col-md">
      <div class="fr-input-group">
        <label class="fr-label" for="sa-date-to">Date de fin</label>
        <input
          class="fr-input"
          type="date"
          id="sa-date-to"
          formControlName="dateTo"
        />
      </div>
    </div>
    <div class="fr-col-12 fr-col-md">
      <div class="fr-input-group">
        <label class="fr-label" for="sa-ip">Adresse IP</label>
        <input
          class="fr-input"
          type="text"
          id="sa-ip"
          formControlName="ip"
          placeholder="192.168.1.1"
        />
      </div>
    </div>
    <div class="fr-col-12 fr-col-md">
      <div class="fr-input-group">
        <label class="fr-label" for="sa-identifier">Identifiant tenté</label>
        <input
          class="fr-input"
          type="text"
          id="sa-identifier"
          formControlName="identifier"
          placeholder="email ou login"
        />
      </div>
    </div>
  </div>
</form>
