<div class="fr-alert fr-alert--warning fr-mb-2w">
  <p>
    Cette personne ne pourra plus se connecter à l'espace de pilotage. Elle ne
    sera pas informée que son compte a été supprimé. Un code de confirmation par
    email vous sera demandé. Recopiez ci-dessous son nom et prénom pour
    confirmer.
  </p>
</div>

<p class="fr-text--bold fr-mb-1w">Nom et prénom à recopier :</p>
<p class="fr-text--bold fr-text-title--blue-france fr-mb-2w">
  {{ expectedDeleteName }}
</p>

<div class="fr-input-group">
  <label class="fr-label" for="supervisor-delete-confirm-input">
    Recopiez ici le nom et prénom
  </label>
  <input
    class="fr-input"
    type="text"
    id="supervisor-delete-confirm-input"
    name="supervisor-delete-confirm-input"
    autocomplete="off"
    [(ngModel)]="deleteConfirmationInput"
    placeholder="Nom Prénom"
  />
</div>

<div class="fr-modal__footer">
  <div
    class="fr-btns-group fr-btns-group--right fr-btns-group--inline-reverse fr-btns-group--inline-lg fr-btns-group--icon-left"
  >
    <div>
      <app-button
        type="submit"
        label="Confirmer la suppression"
        loadingText="Veuillez patienter..."
        [loading]="loading"
        [disabled]="!isDeleteNameConfirmed"
        (action)="deleteUser()"
      ></app-button>
    </div>
    <div>
      <button
        class="fr-btn fr-btn--secondary"
        type="button"
        (click)="deleteComplete.emit()"
      >
        Annuler
      </button>
    </div>
  </div>
</div>
