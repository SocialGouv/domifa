<div class="fr-background-alt--blue-france fr-py-4w">
  <div class="fr-container">
    <h1>Tableau de bord</h1>
    <div class="fr-background-default--grey fr-p-4w">
      <div class="fr-grid-row">
        <div class="fr-col">
          <h2>
            Liste des structures
            <span *ngIf="!!structures && !!filteredStructures"
              >({{ filteredStructures.length
              }}<span *ngIf="totalStructures !== filteredStructures.length"
                >/{{ totalStructures }}</span
              >)</span
            >
          </h2>
        </div>
        <div class="fr-col fr-text--right">
          <app-admin-structures-export></app-admin-structures-export>
        </div>
      </div>
      <div class="fr-display-flex gap-3 fr-align-items-end">
        <div class="flex-grow-1">
          <div class="fr-search-bar" role="search">
            <label class="fr-label" for="search-input"> Rechercher </label>
            <input
              class="fr-input"
              aria-describedby="search-input-messages"
              placeholder="Rechercher"
              name="searchInput"
              [disabled]="searching"
              #searchInput
              id="search-input"
              type="search"
            />
            <div
              class="fr-messages-group"
              id="search-input-messages"
              aria-live="polite"
            ></div>
            <button title="Rechercher" type="button" class="fr-btn">
              Rechercher
            </button>
          </div>
        </div>
        <button
          class="fr-btn fr-btn--tertiary-no-outline fr-icon-equalizer-line"
          aria-label="Filtres"
          [attr.aria-expanded]="showFilters"
          aria-controls="filters-panel"
          (click)="toggleFilters()"
          type="button"
        >
          <span class="fr-sr-only">Filtres</span>
        </button>
      </div>

      <div
        id="filters-panel"
        [hidden]="!showFilters"
        aria-labelledby="filters-label"
      >
        <h2 id="filters-label" class="fr-sr-only">Panneau de filtres</h2>
        <app-structure-filters
          [filters]="this.filters"
          [nbResults]="filteredStructures.length"
          [searching]="searching"
          (updateFilters)="updateFilters($event)"
        ></app-structure-filters>
      </div>

      <ul
        class="fr-badges-group fr-mt-2w fr-mb-2w"
        aria-label="Répartition des structures par statut"
      >
        <li>
          <p class="fr-badge fr-badge--success">
            Actives : {{ statusCounts.VALIDE }}
          </p>
        </li>
        <li>
          <p class="fr-badge fr-badge--warning">
            Non validées : {{ statusCounts.EN_ATTENTE }}
          </p>
        </li>
        <li>
          <p class="fr-badge fr-badge--error">
            Refusées : {{ statusCounts.REFUS }}
          </p>
        </li>
        <li>
          <p class="fr-badge fr-badge--error">
            Supprimées : {{ statusCounts.SUPPRIME }}
          </p>
        </li>
      </ul>

      <div class="admin-list-overlay-wrapper">
        <dsfr-ext-spinner
          *ngIf="searching"
          typeLoader="quarter"
          label="Chargement des données..."
          [overlay]="true"
        ></dsfr-ext-spinner>

        <app-admin-structures-table
          *ngIf="this.structures"
          [structures]="this.structures"
          [filters]="this.filters"
          (sort)="updateFilters($event)"
        ></app-admin-structures-table>

        <div #sentinel class="sentinel-preload"></div>
      </div>
    </div>
  </div>
</div>
