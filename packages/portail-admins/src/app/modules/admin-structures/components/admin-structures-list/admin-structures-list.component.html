<dsfr-ext-spinner
  *ngIf="searching"
  typeLoader="quarter"
  [overlay]="true"
  label="Veuillez patienter"
></dsfr-ext-spinner>

<div class="head-page fr-pt-4w">
  <div class="fr-grid-row">
    <div
      class="fr-container fr-col-md-12 fr-col-12 fr-display-flex fr-justify-content-between fr-align-items-center"
    >
      <h1 class="fr-text-title--blue-france fr-mb-0">
        Liste des {{ totalStructures }} structures
        <span
          *ngIf="
            !!filteredStructures &&
            totalStructures !== filteredStructures.length
          "
        >
          &nbsp;({{ filteredStructures.length }} résultats)
        </span>
      </h1>
      <app-admin-structures-export></app-admin-structures-export>
    </div>
  </div>
</div>

<div class="fr-container fr-pt-2w">
  <div class="fr-tabs fr-mb-3w">
    <app-filter-tabs
      ariaLabel="Répartition des structures par statut"
      [tabs]="statutTabs"
      [selectedKey]="filters.statut || ''"
      (select)="selectStatutTab($event)"
    ></app-filter-tabs>
  </div>

  <div class="fr-grid-row fr-mb-2w">
    <div class="fr-col-12 fr-col-md-6 fr-col-lg-4">
      <label class="fr-label" for="search-input"> Rechercher </label>
      <div class="fr-search-bar" role="search">
        <input
          class="fr-input"
          aria-describedby="search-input-messages"
          placeholder="Rechercher"
          name="searchInput"
          [disabled]="searching"
          #searchInput
          id="search-input"
          type="search"
        />
        <div
          class="fr-messages-group"
          id="search-input-messages"
          aria-live="polite"
        ></div>
        <button title="Rechercher" type="button" class="fr-btn">
          Rechercher
        </button>
      </div>
    </div>
  </div>

  <div class="fr-mb-3w">
    <app-structure-filters
      [filters]="filters"
      [nbResults]="filteredStructures.length"
      [searching]="searching"
      (updateFilters)="updateFilters($event)"
    ></app-structure-filters>
  </div>

  <app-admin-structures-table
    *ngIf="structures"
    [structures]="structures"
    [filters]="filters"
    (sort)="updateFilters($event)"
  ></app-admin-structures-table>

  <div #sentinel class="sentinel-preload"></div>
</div>
