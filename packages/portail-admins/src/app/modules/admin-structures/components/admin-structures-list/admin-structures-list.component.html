<dsfr-ext-spinner
  *ngIf="searching"
  typeLoader="quarter"
  [overlay]="true"
  label="Veuillez patienter"
></dsfr-ext-spinner>

<div class="head-page fr-pt-4w">
  <div class="fr-grid-row">
    <div
      class="fr-container fr-col-md-12 fr-col-12 fr-display-flex fr-justify-content-between fr-align-items-center"
    >
      <h1 class="fr-text-title--blue-france fr-mb-0">
        Liste des {{ totalStructures }} structures
        <span
          *ngIf="
            !!filteredStructures &&
            totalStructures !== filteredStructures.length
          "
        >
          &nbsp;({{ filteredStructures.length }} résultats)
        </span>
      </h1>
      <app-admin-structures-export></app-admin-structures-export>
    </div>
  </div>
</div>

<div class="fr-container fr-pt-2w">
  <div class="fr-tabs fr-mb-3w">
    <ul
      class="fr-tabs__list"
      role="tablist"
      aria-label="Répartition des structures par statut"
    >
      <li role="presentation">
        <button
          type="button"
          class="fr-tabs__tab"
          role="tab"
          [attr.tabindex]="!filters.statut ? 0 : -1"
          [attr.aria-selected]="!filters.statut"
          (click)="updateFilters({ element: 'statut', value: '' })"
        >
          Toutes ({{ totalStructures }})
        </button>
      </li>
      <li role="presentation">
        <button
          type="button"
          class="fr-tabs__tab"
          role="tab"
          [attr.tabindex]="filters.statut === 'VALIDE' ? 0 : -1"
          [attr.aria-selected]="filters.statut === 'VALIDE'"
          (click)="updateFilters({ element: 'statut', value: 'VALIDE' })"
        >
          Actives ({{ statusCounts.VALIDE }})
        </button>
      </li>
      <li role="presentation">
        <button
          type="button"
          class="fr-tabs__tab"
          role="tab"
          [attr.tabindex]="filters.statut === 'EN_ATTENTE' ? 0 : -1"
          [attr.aria-selected]="filters.statut === 'EN_ATTENTE'"
          (click)="updateFilters({ element: 'statut', value: 'EN_ATTENTE' })"
        >
          Non validées ({{ statusCounts.EN_ATTENTE }})
        </button>
      </li>
      <li role="presentation">
        <button
          type="button"
          class="fr-tabs__tab"
          role="tab"
          [attr.tabindex]="filters.statut === 'REFUS' ? 0 : -1"
          [attr.aria-selected]="filters.statut === 'REFUS'"
          (click)="updateFilters({ element: 'statut', value: 'REFUS' })"
        >
          Refusées ({{ statusCounts.REFUS }})
        </button>
      </li>
      <li role="presentation">
        <button
          type="button"
          class="fr-tabs__tab"
          role="tab"
          [attr.tabindex]="filters.statut === 'SUPPRIME' ? 0 : -1"
          [attr.aria-selected]="filters.statut === 'SUPPRIME'"
          (click)="updateFilters({ element: 'statut', value: 'SUPPRIME' })"
        >
          Supprimées ({{ statusCounts.SUPPRIME }})
        </button>
      </li>
    </ul>
  </div>

  <div class="fr-grid-row fr-mb-2w">
    <div class="fr-col-12 fr-col-md-6 fr-col-lg-4">
      <label class="fr-label" for="search-input"> Rechercher </label>
      <div class="fr-search-bar" role="search">
        <input
          class="fr-input"
          aria-describedby="search-input-messages"
          placeholder="Rechercher"
          name="searchInput"
          [disabled]="searching"
          #searchInput
          id="search-input"
          type="search"
        />
        <div
          class="fr-messages-group"
          id="search-input-messages"
          aria-live="polite"
        ></div>
        <button title="Rechercher" type="button" class="fr-btn">
          Rechercher
        </button>
      </div>
    </div>
  </div>

  <div class="fr-mb-3w">
    <app-structure-filters
      [filters]="filters"
      [nbResults]="filteredStructures.length"
      [searching]="searching"
      (updateFilters)="updateFilters($event)"
    ></app-structure-filters>
  </div>

  <app-admin-structures-table
    *ngIf="structures"
    [structures]="structures"
    [filters]="filters"
    (sort)="updateFilters($event)"
  ></app-admin-structures-table>

  <div #sentinel class="sentinel-preload"></div>
</div>
