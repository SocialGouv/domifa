<div class="d-print-none">
  <div
    class="fr-grid-row fr-grid-row--gutters fr-grid-row--bottom text-md-start text-center"
  >
    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="select-type-structure">
          Type de structures
        </label>
        <select
          class="fr-select"
          id="select-type-structure"
          [disabled]="searching"
          (change)="onStructureTypeChange($event)"
        >
          <option value="" selected disabled hidden>
            Sélectionner un type
          </option>
          <option
            *ngFor="let type of structureTypeOptions | keyvalue"
            [value]="type.key"
          >
            {{ type.value }}
          </option>
        </select>
      </div>
    </div>

    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="select-region"> Région </label>
        <select
          class="fr-select"
          id="select-region"
          [disabled]="searching"
          (change)="onRegionChange($event)"
        >
          <option value="" selected disabled hidden>
            Sélectionner une région
          </option>
          <option
            *ngFor="
              let region of REGIONS_LISTE
                | keyvalue
                | sortArray : 'value' : 'asc'
            "
            [value]="region.key"
          >
            {{ region.value }}
          </option>
        </select>
      </div>
    </div>

    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="select-departement"> Département </label>
        <select
          class="fr-select"
          id="select-departement"
          [disabled]="searching"
          (change)="onDepartementChange($event)"
        >
          <option value="" selected disabled hidden>
            Sélectionner un département
          </option>
          <option
            *ngFor="let departement of DEPARTEMENTS_LISTE | keyvalue"
            [value]="departement.key"
          >
            {{ departement.value }}
          </option>
        </select>
      </div>
    </div>

    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="select-nombre-domicilies">
          Nombre de domiciliés
        </label>
        <select
          class="fr-select"
          id="select-nombre-domicilies"
          [disabled]="searching"
          (change)="onDomicilieSegmentChange($event)"
        >
          <option value="" selected disabled hidden>
            Sélectionner un segment
          </option>
          <option
            *ngFor="let segment of segmentUsagersOptions | keyvalue"
            [value]="segment.value"
          >
            {{ segment.value }}
          </option>
        </select>
      </div>
    </div>

    <div class="fr-col-12 fr-col-md">
      <div class="fr-select-group">
        <label class="fr-label" for="select-statut"> Statut </label>
        <select
          class="fr-select"
          id="select-statut"
          [disabled]="searching"
          (change)="onStatutChange($event)"
        >
          <option value="" selected disabled hidden>
            Sélectionner un statut
          </option>
          <option
            *ngFor="let statut of statutOptions | keyvalue"
            [value]="statut.key"
          >
            {{ statut.value }}
          </option>
        </select>
      </div>
    </div>
  </div>
</div>
