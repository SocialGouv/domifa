<div class="fr-content-container">
  <div class="fr-container">
    <div
      *ngIf="loading"
      role="alert"
      aria-busy="true"
      aria-label="Chargement de l'utilisateur..."
      class="text-center fr-py-6w"
    >
      <dsfr-ext-spinner
        typeLoader="quarter"
        label="Chargement de l'utilisateur..."
      ></dsfr-ext-spinner>
    </div>

    <ng-container *ngIf="!loading && user">
      <div class="fr-py-3w" id="subnav">
        <div class="fr-grid-row fr-grid-row--gutters fr-grid-row--middle">
          <div class="fr-col-auto">
            <a
              routerLink="/manage-structure-users"
              class="fr-link fr-link--icon-left fr-icon-arrow-left-s-line"
            >
              Retour à la liste des utilisateurs
            </a>
          </div>
          <div class="fr-col-auto">
            <a
              [routerLink]="['/structure', user.structureUuid]"
              class="fr-link fr-link--icon-right fr-icon-arrow-right-s-line"
            >
              Voir la structure
              <span class="fr-sr-only">
                {{ user.structureName }}
              </span>
            </a>
          </div>
        </div>
        <div
          class="fr-grid-row fr-pt-2w fr-align-items-center fr-grid-row--gutters"
        >
          <div class="fr-col-12 fr-col-md-8 fr-grid-row fr-align-items-center">
            <h1 class="fr-text-title--blue-france fr-p-0w fr-m-0w">
              {{ user.id }} - {{ user.nom }} {{ user.prenom }}
            </h1>
            <span class="fr-ml-2w">
              <app-user-status-badge
                [status]="user.status"
              ></app-user-status-badge>
            </span>
          </div>
          <div
            class="fr-col-12 fr-col-md-4 fr-grid-row fr-grid-row--right fr-align-items-center"
          >
            <app-user-actions
              [user]="user"
              userKind="structure"
              (refresh)="onActionsRefresh()"
            ></app-user-actions>
          </div>
        </div>
      </div>

      <div class="fr-tabs">
        <ul
          class="fr-tabs__list"
          role="tablist"
          aria-label="Onglets de l'utilisateur"
        >
          <li role="presentation">
            <a
              type="button"
              class="fr-tabs__tab"
              role="link"
              [routerLink]="['/manage-structure-users', user.uuid]"
              routerLinkActive
              #infosRla="routerLinkActive"
              [routerLinkActiveOptions]="{ exact: true }"
              [attr.aria-selected]="infosRla.isActive"
            >
              Informations
            </a>
          </li>
          <li role="presentation">
            <a
              type="button"
              class="fr-tabs__tab"
              role="link"
              [routerLink]="['/manage-structure-users', user.uuid, 'activity']"
              routerLinkActive
              #activityRla="routerLinkActive"
              [attr.aria-selected]="activityRla.isActive"
            >
              Suivi de l'activité
            </a>
          </li>
          <li role="presentation">
            <a
              type="button"
              class="fr-tabs__tab"
              role="link"
              [routerLink]="[
                '/manage-structure-users',
                user.uuid,
                'security-logs'
              ]"
              routerLinkActive
              #securityLogsRla="routerLinkActive"
              [attr.aria-selected]="securityLogsRla.isActive"
            >
              Suivi sécurité
            </a>
          </li>
          <li role="presentation">
            <a
              type="button"
              class="fr-tabs__tab"
              role="link"
              [routerLink]="['/manage-structure-users', user.uuid, 'brevo']"
              routerLinkActive
              #brevoRla="routerLinkActive"
              [attr.aria-selected]="brevoRla.isActive"
            >
              Suivi mail
            </a>
          </li>
          <li role="presentation">
            <a
              type="button"
              class="fr-tabs__tab"
              role="link"
              [routerLink]="['/manage-structure-users', user.uuid, 'sessions']"
              routerLinkActive
              #sessionsRla="routerLinkActive"
              [attr.aria-selected]="sessionsRla.isActive"
            >
              Sessions
            </a>
          </li>
        </ul>
      </div>

      <div class="fr-content">
        <router-outlet></router-outlet>
      </div>
    </ng-container>
  </div>
</div>
