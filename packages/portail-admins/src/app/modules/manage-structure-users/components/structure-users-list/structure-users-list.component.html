<div class="head-page fr-pt-4w">
  <div class="fr-grid-row">
    <div class="fr-container fr-col-md-12 fr-col-12">
      <h1 class="fr-text-title--blue-france">
        Liste des {{ users.length }} utilisateurs de DomiFa
      </h1>
    </div>
  </div>
</div>

<div class="fr-container fr-pt-2w">
  <div class="fr-tabs fr-mb-3w">
    <app-filter-tabs
      ariaLabel="Répartition des utilisateurs par statut"
      [tabs]="statusTabs"
      [selectedKey]="selectedStatus"
      (select)="selectStatus($event)"
    ></app-filter-tabs>
  </div>

  <div class="fr-grid-row fr-mb-2w">
    <div class="fr-col-12 fr-col-md-4">
      <div class="fr-select-group fr-mb-0w">
        <label class="fr-label" for="structure-users-obsolete-filter">
          Ancienneté du compte
        </label>
        <select
          class="fr-select"
          id="structure-users-obsolete-filter"
          name="obsoleteFilter"
          [(ngModel)]="obsoleteFilter"
          (ngModelChange)="applyFilter()"
        >
          <option value="ALL">Tous les comptes</option>
          <option value="OBSOLETE">
            Comptes obsolètes ({{ obsoleteCount }})
          </option>
        </select>
        <p class="fr-hint-text">
          Inscription &gt; 1 an et aucune connexion depuis 12 mois
        </p>
      </div>
    </div>
  </div>

  <dsfr-ext-spinner
    *ngIf="loading$ | async"
    typeLoader="quarter"
    label="Chargement des utilisateurs..."
    [overlay]="true"
  ></dsfr-ext-spinner>

  <app-users-table
    tableId="structure-users-table"
    caption="Liste des utilisateurs des structures"
    [users]="filteredUsers"
    [showStructure]="true"
  >
    <ng-template #actionsCell let-user>
      <app-user-actions
        [user]="user"
        userKind="structure"
        (refresh)="onActionsRefresh()"
      ></app-user-actions>
    </ng-template>
  </app-users-table>
</div>
