<div class="head-page fr-pt-4w">
  <div class="fr-grid-row">
    <div class="fr-container fr-col-md-12 fr-col-12">
      <h1 class="fr-text-title--blue-france">
        Liste des {{ users.length }} utilisateurs de DomiFa
      </h1>
    </div>
  </div>
</div>

<div class="fr-container fr-pt-2w">
  <ul
    class="fr-grid-row fr-grid-row--gutters fr-mb-3w stat-cards-list"
    aria-label="Répartition des utilisateurs par statut"
  >
    <li class="fr-col-12 fr-col-sm-6 fr-col-md-3">
      <app-stat-card
        label="Actifs"
        [value]="statusCounts.ACTIVE"
        icon="fr-icon-checkbox-circle-line"
        status="success"
      ></app-stat-card>
    </li>
    <li class="fr-col-12 fr-col-sm-6 fr-col-md-3">
      <app-stat-card
        label="En attente"
        [value]="statusCounts.PENDING"
        icon="fr-icon-time-line"
        status="info"
      ></app-stat-card>
    </li>
    <li class="fr-col-12 fr-col-sm-6 fr-col-md-3">
      <app-stat-card
        label="Blocage temporaire"
        [value]="statusCounts.TEMPORARILY_BLOCKED"
        icon="fr-icon-lock-line"
        status="warning"
      ></app-stat-card>
    </li>
    <li class="fr-col-12 fr-col-sm-6 fr-col-md-3">
      <app-stat-card
        label="Bloqués"
        [value]="statusCounts.BLOCKED"
        icon="fr-icon-lock-fill"
        status="error"
      ></app-stat-card>
    </li>
  </ul>

  <dsfr-ext-spinner
    *ngIf="loading$ | async"
    typeLoader="quarter"
    label="Chargement des utilisateurs..."
    [overlay]="true"
  ></dsfr-ext-spinner>

  <app-users-table
    tableId="structure-users-table"
    caption="Liste des utilisateurs des structures"
    [users]="users"
    [showStructure]="true"
  >
    <ng-template #actionsCell let-user>
      <app-user-actions
        [user]="user"
        userKind="structure"
        (refresh)="onActionsRefresh()"
      ></app-user-actions>
    </ng-template>
  </app-users-table>
</div>
