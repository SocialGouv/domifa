version: "3.4"

services:
  postgres:
    image: postgis/postgis:15-3.5
    container_name: domifa-postgres
    volumes:
      - ./_scripts/docker/postgres-restore-test-dump.docker-entrypoint.sh:/docker-entrypoint-initdb.d/postgres-restore-dump.docker-entrypoint.sh
      # Runs after the dump restore (alphabetical order via the zz- prefix)
      # to add the `otp` table needed by integration tests.
      - ./_scripts/docker/postgres-init-otp.sql:/docker-entrypoint-initdb.d/zz-postgres-init-otp.sql:ro
      - ./_scripts:/app/_scripts:delegated
    ports:
      - "5432:5432"
    environment:
      TZ: "Europe/Paris"
      POSTGRES_DB: domifa_test
      POSTGRES_USER: domifa_user
      POSTGRES_PASSWORD: xxxxxxxxxxxxxxxxxxx
      POSTGRES_SSL: "false"
    env_file: ./.env.dev.example.env
    healthcheck:
      retries: 5
      timeout: 5s
      interval: 5s
      start_period: 2s
      test: ["CMD-SHELL", "pg_isready -U domifa_user"]
