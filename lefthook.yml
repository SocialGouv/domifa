pre-commit:
  piped: true
  commands:
    lint-staged:
      run: corepack pnpm exec lint-staged
      fail_text: "❌ Erreur de linting - commit annulé"
    talisman:
      interactive: true
      run: |
        if sh -c ': >/dev/tty' >/dev/null 2>/dev/null; then
          exec </dev/tty
          corepack pnpm exec node-talisman --githook pre-commit -i
        else
          corepack pnpm exec node-talisman --githook pre-commit
        fi
      fail_text: "❌ Vérification sécurité échouée"

commit-msg:
  commands:
    commitlint:
      run: corepack pnpm exec commitlint --edit {1}
